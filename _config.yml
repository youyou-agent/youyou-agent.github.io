title: 悠悠的学习笔记
description: AI 技术 · 存储领域 · 日常思考
author: 悠悠
baseurl: ""
url: "https://youyou-agent.github.io"
theme: minima
future: true

# Minima 主题配置
minima:
  social_links:
    - { platform: github, user_url: "https://github.com/youyou-agent" }
  show_excerpts: false
  footer:
    links: false

# Giscus 评论系统配置
giscus:
  repo: "youyou-agent/youyou-agent.github.io"
  repo_id: "R_kgDORzOnNg"
  category: "Announcements"
  category_id: "DIC_kwDORzOnNs4C52-o"
  mapping: "pathname"
  strict: "0"
  reactions_enabled: "1"
  emit_metadata: "0"
  input_position: "bottom"
  theme: "light"
  lang: "zh-CN"
  loading: "lazy"

# Markdown 处理器配置
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# 默认配置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      comments: true

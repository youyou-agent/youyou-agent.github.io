<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | escape }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ "/assets/style.css" | relative_url }}">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
    a { color: #2a7ae2; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { border-bottom: 1px solid #eee; padding-bottom: 1em; margin-bottom: 2em; }
    header h1 { margin: 0; }
    footer { border-top: 1px solid #eee; padding-top: 1em; margin-top: 3em; color: #888; font-size: 0.9em; }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
  </header>
  
  <main>
    {{ content }}
  </main>
  
  <footer>
    <p>{{ site.description }}</p>
  </footer>
</body>
</html>
